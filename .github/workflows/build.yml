name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 使用 Java 21 避免 Gradle 报错
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ⬇️⬇️⬇️ 关键修改在这里！ ⬇️⬇️⬇️
      # 我们加上了 @capacitor/app (深度链接用) 和 @matthme/capacitor-pinned-shortcuts (快捷方式用)
      # 这样即使你上传的 package.json 漏了它们，这里也会强制补上
      - name: Install Dependencies
        run: npm install && npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/browser
     
      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew Executable
        run: cd android && chmod +x gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk