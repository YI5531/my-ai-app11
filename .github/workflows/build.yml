name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. 设置 Java 环境 (Gradle 需要)
      # 保持使用 JDK 21，防止 Gradle 版本报错
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 3. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. 安装依赖
      # ✅ 这里的逻辑已经简化：
      # GitHub 会自动根据你提交的 package.json 安装所有插件
      # (包括 @matthme/capacitor-pinned-shortcuts, @capacitor-community/background-media 等)
      - name: Install Dependencies
        run: npm install

      # 5. 编译前端网页 (生成 dist 或 build 目录)
      - name: Build Web App
        run: npm run build

      # 6. 同步 Capacitor
      # 这一步非常关键！它会把 Web 资源和插件的 Native 代码同步到 android/ 目录中
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. 赋予 Gradle 脚本执行权限
      - name: Make Gradlew Executable
        run: cd android && chmod +x gradlew

      # 8. 开始打包 APK (Debug 版)
      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      # 9. 上传 APK 供你下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-runner-debug
          # 这是标准的 Capacitor 安卓输出路径
          path: android/app/build/outputs/apk/debug/app-debug.apk